name: Griechischer Joghurt mit Honig und Walnüssen
description: Cremiger griechischer Joghurt verfeinert mit goldgelbem Honig und knackigen
  Walnüssen.
author: Chefkoch
url: https://www.lidl-kochen.de/rezeptwelt/griechischer-joghurt-mit-honig-und-nuessen-133573
category: 🥣
servings: 1
prep_time: 5
cook_time: 0
kcal: 273
tags:
- Frühstück
- Honig
- Joghurt
- Nüsse
- Walnüsse
ingredients:
- name: Griechischer Joghurt
  amount: 200 g
- name: Honig
  amount: 2 EL
- name: Walnüsse
  amount: 30 g
instructions:
- Griechischen Joghurt in eine Schüssel geben.
- Honig über den Joghurt träufeln.
- Walnüsse grob hacken und über den Joghurt streuen.
- Nach Belieben servieren und genießen.
