name: Schmorkohl nach Omis Rezept
description: Herzhafter Schmorkohl mit gemischtem Hackfleisch, Zwiebeln und Kümmel
  - eine deftige Alternative zu klassischen Kohlrouladen.
author: Chefkoch
url: https://www.chefkoch.de/rezepte/844451204302455/Schmorkohl-nach-Omis-Rezept.html
category: 🥩
servings: 4
prep_time: 15
cook_time: 30
kcal: 350
image: images/recipes/schmorkohl-nach-omis-rezept.jpg
tags:
- Fleisch
- Hackfleisch
- Kohl
- Öl
- Zwiebel
ingredients:
- name: Weißkohl
  amount: 1 Kopf
- name: Zwiebeln
  amount: 3
- name: Brühe
  amount: 3 TL
- name: Pfeffer
  amount: 2 TL
- name: Salz
  amount: 1 EL
- name: Kümmelpulver
  amount: nach Geschmack
- name: Wasser
  amount: 750 ml
- name: Hackfleisch (gemischt)
  amount: 400 g
- name: Olivenöl
  amount: 6 EL
instructions:
- Den Kohl vom Strunk befreien und klein schneiden. In einem großen Topf das Olivenöl
  erhitzen und den Kohl auf höchster Temperatur unter Rühren anbraten.
- Die Zwiebeln hacken und zusammen mit dem Hackfleisch auf höchster Temperatur unter
  Rühren anbraten. Wenn Kohl und Hackfleisch schön braun sind, das Hack zum Kohl in
  den Topf geben und die Gewürze zugeben.
- Die Brühe aufgießen und kurz köcheln lassen. Nochmal abschmecken und Soßenbinder
  zum Andicken einrühren.
- Dazu passen Kartoffeln.
