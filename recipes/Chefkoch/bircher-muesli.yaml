name: Bircher Müsli
description: Gesund, zuckerarm, sättigend, gut vorzubereiten
author: Chefkoch
url: https://www.chefkoch.de/rezepte/1341381236893607/Bircher-Muesli.html
category: 🥣
servings: 3
prep_time: 10
cook_time: 0
kcal: 330
image: images/recipes/bircher-muesli.jpg
tags:
- Äpfel
- Haferflocken
- Haselnüsse
- Honig
