name: Udon-Pfanne mit Gochujang-Erdnuss-Kokos-Soße
description: Richtig cremige Udon-Pfanne mit Spinat, Brokkoli, Edamame und ultra-würziger Erdnuss-Kokos-Soße mit Gochujang. Ohne Anbraten, alles direkt in die Pfanne. Schnell, warm, satt und perfekt für jeden Tag.
author: Instagram
category: 🍲
servings: 3
prep_time: 10
cook_time: 8
import_date: 2026-03-02
image: images/recipes/udon-pfanne-mit-gochujang-erdnuss-kokos-sosse.jpg
tags:
  - Brokkoli
  - Edamame
  - Erdnussmus
  - Kohl
  - Kokosmilch
  - Koriander
  - Mandeln
  - Nüsse
  - Spinat
  - Udon

ingredients:
  - name: Spinat (frisch)
    amount: 1 Packung
  - name: Udon-Nudeln
    amount: 1 Packung
  - name: Edamame (vorgekocht)
    amount: 1 Hand
  - name: Brokkoli (in Röschen)
    amount: ½
  - name: Zwiebel (rot, fein geschnitten)
    amount: 1
  - name: Lemongrass (fein geschnitten)
    amount: etwas
  - name: Mandeln
    amount: 1 kleine Hand
  - name: Chili
    amount: nach Geschmack
  - name: Kokosmilch
    amount: 400 ml
  - name: Ahornsirup
    amount: 1-2 TL
  - name: Sojasoße
    amount: 2-3 EL
  - name: Erdnussmus
    amount: 1 EL gehäuft
  - name: Gochujang
    amount: 1-2 TL
  - name: Koriander (frisch, optional)
    amount: nach Geschmack
  - name: Chili-Öl (optional)
    amount: nach Geschmack

instructions:
  - Spinat in die Pfanne geben.
  - Udon-Nudeln, Edamame, Brokkoli-Röschen, Zwiebel, Lemongrass, Mandeln und Chili oben drauf verteilen.
  - Kokosmilch, Ahornsirup, Sojasoße, Erdnussmus und Gochujang zu einer glatten Soße verrühren.
  - Die Soße über alles gießen.
  - Deckel drauf und 6-8 Minuten köcheln lassen, bis die Nudeln fertig sind und alles zusammengefallen ist.
  - Einmal gut durchmischen und abschmecken.
  - Optional mit frischem Koriander und Chili-Öl toppen.
