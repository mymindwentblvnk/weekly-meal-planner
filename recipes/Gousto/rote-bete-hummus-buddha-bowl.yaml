ingredients:
  - name: Kreuzkümmel (gemahlen)
    amount: 1 TL
  - name: Knoblauchzehe
    amount: 2
  - name: Kichererbsen
    amount: 400 g
  - name: Zitrone
    amount: 1
  - name: Sesamsamen (schwarz)
    amount: 5 g
  - name: Brokkoli (Tenderstem)
    amount: 160 g
  - name: Butternut Kürbis
    amount: 160 g
  - name: Rote Bete
    amount: 250 g
  - name: Ruccola
    amount: 50 g
  - name: Tahini
    amount: 15 g
  - name: Bulgurweizen
    amount: 75 g
instructions:
  - Heizen Sie den Backofen auf 200 °C Ober-/Unterhitze (180 °C Umluft) bzw. Gas Stufe 6 vor und bringen Sie Wasser im Wasserkocher zum Kochen. Lassen Sie die Rote Bete in einem Sieb über der Spüle abtropfen. Schneiden Sie die abgetropfte Rote Bete in Spalten.
  - Die Butternusskürbiswürfel, den Knoblauch (mit Schale) und die Hälfte der Rote-Bete-Spalten (den Rest verwenden Sie später!) auf ein Backblech geben. Mit Olivenöl beträufeln und mit einer Prise Salz würzen. Das/Die Blech(e) für 10–15 Minuten in den Ofen schieben.
  - Während das Gemüse im Ofen ist, den Bulgur in einen Topf mit reichlich kochendem Wasser und einer Prise Salz geben. Bei starker Hitze zum Kochen bringen und 7–9 Minuten kochen lassen, bis der Bulgur bissfest ist. Anschließend abgießen und zurück in den Topf geben.
  - Währenddessen die Kichererbsen abgießen und abspülen. Die Zitrone(n) vierteln.
  - Gib die restlichen Rote-Bete-Spalten zusammen mit der Hälfte der abgetropften Kichererbsen (die restlichen Kichererbsen werden später verwendet!), dem Tahini und einem Spritzer Zitronensaft in eine Küchenmaschine. Gib 1 EL [1 1/2 EL] [2 EL] Olivenöl, 1 EL [1 1/2 EL] [2 EL] kaltes Wasser und eine großzügige Prise Salz hinzu und püriere alles glatt – fertig ist dein Rote-Bete-Hummus.
  - Nach 10–15 Minuten die restlichen Kichererbsen mit dem Gemüse auf das/die Backblech(e) geben, mit gemahlenem Kreuzkümmel bestreuen, mit 1 TL [1½ TL] [2 TL] Olivenöl beträufeln und gut vermengen. Den Brokkoli (z. B. Tenderstem) auf das/die Backblech(e) geben, mit 1 TL [1½ TL] [2 TL] Olivenöl beträufeln und eine Prise Salz hinzufügen. Das/Die Backblech(e) für weitere 10–15 Minuten in den Ofen schieben oder bis alles gar und goldbraun ist.
  - In der Zwischenzeit etwas Zitronensaft, 2 EL [3 EL] [4 EL] Olivenöl und eine Prise Salz und Pfeffer in eine kleine Schüssel geben und alles gut verrühren. Sobald das Gemüse gar ist, den gerösteten Knoblauch aus der Schale in die Schüssel drücken und die Schale entsorgen. Den gerösteten Knoblauch mit einer Gabel zerdrücken und unter das Dressing rühren – fertig ist das Knoblauchdressing. Den Salat waschen und mit Küchenpapier trocken tupfen. Den Rote-Bete-Hummus mit dem Bulgur, dem Salat und dem gerösteten Gemüse servieren. Das Knoblauchdressing darüberträufeln und mit dem restlichen Zitronenschnitz garnieren. Mit schwarzen Sesamsamen bestreuen.
