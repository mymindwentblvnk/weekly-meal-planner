name: Rote-Bete-Hummus & Buddha Bowl mit geröstetem Gemüse
description: Bunte Buddha Bowl mit selbstgemachtem Rote-Bete-Hummus, geröstetem Butternut-Kürbis, Brokkoli und Kichererbsen auf Bulgur, garniert mit Knoblauchdressing und schwarzen Sesamsamen.
author: Gousto
url: https://www.gousto.co.uk/cookbook/vegan-recipes/beetroot-hummus-roast-veg-buddha-bowl
category: 🥦
servings: 2
prep_time: 0
cook_time: 30
kcal: 426
import_date: 2026-03-03
image: images/recipes/rote-bete-hummus-buddha-bowl.jpg
tags:
  - Brokkoli
  - Bulgur
  - Kerne
  - Kichererbsen
