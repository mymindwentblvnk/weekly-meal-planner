name: Süßkartoffel-Dal
description: Cremiges Dal aus roten Linsen mit gerösteten Süßkartoffelspalten, Spinat und karamellisierten Zwiebeln, verfeinert mit Curry, Ingwer und frischem Koriander.
author: Gousto
url: https://www.gousto.co.uk/cookbook/vegetarian-recipes/sweet-potato-dal
category: 🥦
servings: 2
prep_time: 0
cook_time: 35
kcal: 495
import_date: 2026-03-03
image: images/recipes/suess-kartoffel-dal.jpg
tags:
  - Curry
  - Ingwer
  - Kartoffeln
  - Knoblauch
  - Kräuter
  - Linsen
  - Spinat
  - Süßkartoffel
  - Zwiebel
ingredients:
  - name: Lorbeerblatt
    amount: 1
  - name: Knoblauchzehe
    amount: 2
  - name: Koriander (frisch)
    amount: 10 g
  - name: Zwiebeln
    amount: 2
  - name: Ingwer
    amount: 15 g
  - name: Currypulver
    amount: 1 EL
  - name: Spinat
    amount: 150 g
  - name: Süskartoffeln
    amount: 300 g
  - name: Gemüsebrühe
    amount: 1 Würfel
  - name: Chiliflocken
    amount: 0,5 TL
  - name: Kurkuma (gemahlen)
    amount: 1 TL
  - name: Rote Linsen
    amount: 300 g

instructions:
  - Den Backofen auf 220 °C Ober-/Unterhitze (200 °C Umluft) vorheizen. Die Süßkartoffeln in ca. 2 cm dicke Spalten schneiden. Den Knoblauch mit dem Messerrücken zerdrücken, schälen und sehr fein hacken (oder reiben). Den Ingwer mit einem Teelöffel schälen und sehr fein hacken (oder reiben).
  - Süßkartoffelspalten, Knoblauch, Ingwer und Chiliflocken (Vorsicht, Menge je nach gewünschter Schärfe anpassen) in eine Schüssel geben. Mit 1–2 EL Pflanzenöl vermengen und mit Salz und Pfeffer abschmecken.
  - Die panierten Kartoffelspalten auf ein Backblech (vorzugsweise antihaftbeschichtet) geben und 20–25 Minuten backen, bis sie gar und an den Rändern karamellisiert sind. In der Zwischenzeit die Linsen abspülen und mit 650 ml (1,3 l) Wasser in einen breiten Topf mit Deckel geben. Bei starker Hitze zum Kochen bringen.
  - Kurkuma, Currypulver, Lorbeerblatt(blätter) und einen halben (oder ganzen) Brühwürfel hinzufügen und kurz verrühren. Sobald die Flüssigkeit kocht, die Hitze reduzieren und zugedeckt 20 Minuten köcheln lassen, oder bis das Wasser fast vollständig verdampft ist. Umrühren, bis eine dünne, breiartige Konsistenz entsteht.
  - In der Zwischenzeit die Zwiebeln fein schneiden. 1–2 EL Pflanzenöl in einer großen Pfanne bei mittlerer bis hoher Hitze erhitzen. Sobald das Öl heiß ist, die Zwiebeln und je eine Prise Zucker und Salz in die Pfanne geben. Die Hitze reduzieren und die Zwiebeln 20–25 Minuten braten, bis sie knusprig und braun sind. Dabei gelegentlich umrühren (die Hitze reduzieren, damit nichts anbrennt).
  - Spinat waschen, abtropfen lassen und trocken tupfen für Schritt 7. Koriander fein hacken (zum Servieren)
  - Sobald die Linsen gar sind und das meiste Wasser verdampft ist, den abgetropften Spinat bei schwacher Hitze unterrühren. Den Spinat vorsichtig unterheben, bis er zusammenfällt, aber seine Form behält – das ist Ihr Dal. Die Zwiebel nach Belieben salzen. Das Dal in Schüsseln anrichten und mit Süßkartoffelspalten und Röstzwiebeln garnieren. Mit Koriander bestreuen und genießen!
