name: Vegane Quarkkeulchen mit Apfelkompott
description: Sächsische Spezialität vegan interpretiert - mit Sojaquark, Kartoffeln
  und selbstgemachtem Apfelkompott
author: EatSmarter
url: https://eatsmarter.de/rezepte/vegane-quarkkeulchen-mit-apfelkompott
category: 🥣
servings: 4
prep_time: 15
cook_time: 20
kcal: 447
image: images/recipes/vegane-quarkkeulchen-mit-apfelkompott.jpg
tags:
- Apfel
- Dinkel
- Kartoffel
- Limette
- Mehl
- Obst
- Öl
- Rapsöl
- Rosinen
- Soja
- Zimt
- Zucker
ingredients:
- name: Kartoffeln
  amount: 600 g
- name: Sojaquark
  amount: 4 EL
- name: Rohrohrzucker
  amount: 4 EL
- name: Rosinen
  amount: 3 EL
- name: Dinkelmehl Type 1050
  amount: 130 g
- name: Sojamehl
  amount: 2 EL
- name: Salz
  amount: nach Geschmack
- name: Limettensaft
  amount: 1 EL
- name: Rapsöl
  amount: 2 EL
- name: Äpfel
  amount: 2
- name: Zimt
  amount: 1 Prise
instructions:
- Für die Quarkkeulchen die Kartoffeln in kochendem Wasser 15-20 Minuten weich kochen,
  abgießen, abkühlen lassen. Kartoffeln pellen, mit einer Kartoffelpresse pressen
  und in eine Schüssel geben.
- Zu den Kartoffeln den Sojaquark, 2 EL Zucker, Rosinen, Dinkelmehl, Sojamehl, Salz
  und Limettensaft zugeben und alles zu einem glatten Teig vermengen. Aus dem Teig
  mit feuchten Händen 12 Plätzchen formen. Öl in einer Pfanne erhitzen, Quarkkeulchen
  von beiden Seiten 5 Minuten bei mittlerer Hitze goldgelb anbraten und im Ofen warm
  halten.
- Inzwischen Äpfel waschen, halbieren, entkernen und klein schneiden. Äpfel in einem
  Topf mit 1 EL Zucker und Zimt 6 Minuten bei mittlerer Hitze andünsten. Dann 50 ml
  Wasser zugeben und 5 Minuten köcheln lassen. Anschließend Quarkkeulchen mit Apfelkompott
  und mit dem restlichen Zucker bestreut servieren.
