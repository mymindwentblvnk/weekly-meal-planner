name: Roggenbrote mit Avocado und Rote-Bete-Aufstrich
description: Knusprige Roggenbrote mit cremigem Rote-Bete-Aufstrich, frischer Avocado
  und Pinienkernen
author: EatSmarter
url: https://eatsmarter.de/rezepte/roggenbrote-mit-avocado-und-rote-bete-aufstrich
category: 🍲
servings: 4
prep_time: 15
cook_time: 0
kcal: 342
image: images/recipes/roggenbrote-mit-avocado-und-rote-bete-aufstrich.jpg
tags:
- Avocado
