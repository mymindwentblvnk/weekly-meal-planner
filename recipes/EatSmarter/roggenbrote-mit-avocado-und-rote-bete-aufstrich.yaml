- Koriander
- Pinienkerne
- Roggen
- Rote Bete
- Zitrone
ingredients:
- name: Rote Bete (vorgekocht, vakuumiert)
  amount: 250 g
- name: Frischkäse
  amount: 150 g
- name: Joghurt (1,5% Fett)
  amount: 100 g
- name: Zitronensaft
  amount: 1 EL
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Roggenbrotscheiben (Vollkorn)
  amount: 4
- name: Avocado (reif)
  amount: 1
- name: Pinienkerne
  amount: 2 EL
- name: Koriander (frisch)
  amount: nach Geschmack
instructions:
- Die Rote Bete abtropfen lassen und grob würfeln. Mit Frischkäse, Joghurt und Zitronensaft
  in einem hohen Gefäß mit dem Pürierstab fein pürieren. Mit Salz und Pfeffer abschmecken.
- Die Roggenbrotscheiben bei Bedarf toasten.
- Die Avocado halbieren, entkernen, das Fruchtfleisch herauslösen und in Scheiben
  schneiden.
- Die Pinienkerne in einer Pfanne ohne Fett goldbraun rösten.
- Den Rote-Bete-Aufstrich auf den Brotscheiben verteilen, mit Avocadoscheiben belegen
  und mit Pinienkernen bestreuen. Nach Belieben mit frischem Koriander garnieren.
