ingredients:
- name: Süßkartoffeln (klein)
  amount: 4 Stück (à 300 g)
- name: Knoblauchzehe
  amount: 1
- name: Zwiebel (klein)
  amount: 1 (30 g)
- name: Eingelegte Jalapeños
  amount: 4
- name: Getrocknete Aprikosen
  amount: 50 g
- name: Schwarze Bohnen (Dose, Abtropfgewicht)
  amount: 200 g
- name: Feta (45% Fett i. Tr.)
  amount: 120 g
- name: Joghurt (3,5% Fett)
  amount: 150 g
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Geräuchertes Paprikapulver
  amount: 1 Prise
- name: Rotkohl
  amount: 200 g
- name: Olivenöl
  amount: 1 EL
- name: Zitronensaft
  amount: 1 EL
- name: Honig
  amount: 1 TL
- name: Koriander
  amount: 1 Handvoll (5 g)
- name: Bio-Limette
  amount: 1
instructions:
- Süßkartoffeln gründlich waschen und rundherum einige Male einstechen. Auf ein mit
  Backpapier belegtes Backblech geben und im vorgeheizten Backofen bei 180 °C (Umluft
  160 °C; Gas Stufe 2-3) 50 Minuten backen.
- Inzwischen für die Füllung Knoblauch und Zwiebel schälen und fein würfeln. Jalapeños
  in Scheiben schneiden, Stiele dabei entfernen. Aprikosen in kleine Würfel schneiden.
- Bohnen abspülen und abtropfen lassen. Feta grob zerbröseln. Bohnen mit Knoblauch,
  Zwiebel, Jalapeñoscheiben, Aprikosen, Joghurt und Feta mischen und mit Salz, Pfeffer
  und 1 Prise Paprika würzen.
- Rotkohl putzen, waschen und in feine Streifen hobeln. Rotkohl mit Öl, Zitronensaft,
  Honig, Salz und Pfeffer kräftig zerkneten.
- Koriander waschen, trocken schütteln und Blätter abzupfen.
- Kartoffeln aus dem Ofen nehmen, längs einschneiden, leicht auseinanderklappen und
  das Innere mit einer Gabel etwas auflockern. Bohnenmischung daraufgeben, Rotkohlsalat
  darübergeben und mit Koriander garnieren. Limette waschen, in Spalten schneiden
  und dazu reichen.
