name: Gebackene Süßkartoffeln mit Bohnen-Rotkohl-Feta-Topping
description: Gebackene Süßkartoffeln gefüllt mit würziger Bohnenmischung, Feta und
  knackigem Rotkohlsalat
author: EatSmarter
url: https://eatsmarter.de/rezepte/gebackene-suesskartoffeln-mit-bohnen-rotkohl-feta-topping
category: 🍲
servings: 4
prep_time: 10
