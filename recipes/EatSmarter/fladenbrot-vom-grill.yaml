name: Fladenbrot vom Grill
description: Gegrilltes Fladenbrot mit würziger Feta-Creme und aromatischem Tomatensalat
author: EatSmarter
url: https://eatsmarter.de/rezepte/fladenbrot-vom-grill
category: 🍲
servings: 4
prep_time: 10
cook_time: 15
kcal: 447
image: images/recipes/fladenbrot-vom-grill.jpg
tags:
