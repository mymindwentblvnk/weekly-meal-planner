ingredients:
- name: Blumenkohl
  amount: 500 g
- name: Große Zwiebel
  amount: 1 (80 g)
- name: Knoblauchzehen
  amount: 3
- name: Rote Paprikaschote
  amount: 1
- name: Tomaten
  amount: 300 g
- name: Olivenöl
  amount: 3 EL
- name: Gemüsebrühe (salzarm)
  amount: 200 ml
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Gemahlener Kreuzkümmel
  amount: 1 TL
- name: Edelsüßes Paprikapulver
  amount: 1 TL
- name: Piri-Piri (Chiligewürz)
  amount: 1/4 TL
- name: Eier
  amount: 4
- name: Kürbiskerne
  amount: 30 g (2 EL)
- name: Petersilie
  amount: 10 g (0.5 Bund)
instructions:
- Blumenkohl putzen, waschen und in kleine Röschen zerteilen. Zwiebel und Knoblauch
  schälen und hacken. Paprikaschote halbieren, entkernen, waschen und in Würfel schneiden.
  Tomaten putzen, waschen und klein würfeln.
- In einer großen Pfanne Olivenöl erhitzen. Zwiebel- und Paprikawürfel darin unter
  Rühren etwa 7 Minuten bei mittlerer Hitze andünsten. Dann Knoblauch, Blumenkohl
  und Tomaten unterrühren und Brühe zugießen. Mit Salz, Pfeffer, Kreuzkümmel, Paprikapulver
  und 1/4 TL Piri-Piri würzen und etwa 10 Minuten bei kleiner Hitze dickflüssig einköcheln
  lassen. Sauce mit Salz und Pfeffer abschmecken.
- Eier nacheinander aufschlagen, in die Sauce gleiten lassen und zugedeckt bei kleiner
  Hitze 5-7 Minuten stocken lassen. Kürbiskerne in einer heißen Pfanne ohne Fett anrösten.
  Petersilie waschen, trocken schleudern, Blättchen hacken. Die orientalische Gemüse-Eier-Pfanne
  mit Petersilie und Kürbiskernen bestreuen.
