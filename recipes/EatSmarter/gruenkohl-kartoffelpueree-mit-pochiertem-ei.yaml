name: Grünkohl-Kartoffelpüree mit pochiertem Ei
description: Cremiges Kartoffelpüree mit Grünkohl und Frühlingszwiebeln, getoppt mit
  pochiertem Ei
author: EatSmarter
url: https://eatsmarter.de/rezepte/gruenkohl-kartoffelpueree-mit-pochiertem-ei
category: 🍲
servings: 4
prep_time: 10
cook_time: 30
kcal: 282
image: images/recipes/gruenkohl-kartoffelpueree-mit-pochiertem-ei.jpg
tags:
- Butter
