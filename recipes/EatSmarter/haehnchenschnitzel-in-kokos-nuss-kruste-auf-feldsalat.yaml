ingredients:
- name: Feldsalat
  amount: 100 g
- name: Rote Bete (gekocht, vakuumiert)
  amount: 50 g
- name: Walnusskerne
  amount: 50 g
- name: Senf
  amount: 1 TL
- name: Honig
  amount: 1 TL
- name: Balsamessig
  amount: 1 EL
- name: Olivenöl
  amount: 4 EL
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Hähnchenbrustfilet
  amount: 300 g
- name: Ei
  amount: 1
- name: Kokosmehl
  amount: 30 g (3 EL)
- name: Birne
  amount: 0.5
- name: Zitronensaft
  amount: 1 TL
instructions:
- Feldsalat waschen, trocken schleudern und klein zupfen. Rote Bete grob raspeln.
  Walnüsse in einer heißen Pfanne ohne Fett bei mittlerer Hitze 3 Minuten anrösten.
  Die Hälfte der Walnüsse fein hacken.
- Für die Vinaigrette Senf, Honig und Balsamessig mit 2 EL Olivenöl verrühren und
  mit Salz und Pfeffer abschmecken.
- Hähnchenbrustfilet waschen, trocken tupfen und in 8 Stücke schneiden. Fleisch mit
  Salz und Pfeffer würzen. Ei in einem tiefen Teller verquirlen. Gehackte Walnüsse
  mit Kokosmehl in einem weiteren Teller mischen.
- Hähnchenbrustfilets zuerst in dem Ei, dann in der Kokosmischung wenden. Restliches
  Öl in einer Pfanne erhitzen. Panierte Hähnchenschnitzel darin bei mittlerer Hitze
  von allen Seiten in 10-15 Minuten goldbraun braten.
- Inzwischen Birnenhälfte waschen, Kerngehäuse entfernen, Birnen in Spalten schneiden
  und mit Zitronensaft beträufeln. Birnenspalten 2 Minuten bei mittlerer Hitze in
  einer Pfanne braten.
- Feldsalat mit Roter Bete und Birnen mischen, anrichten und mit Vinaigrette beträufeln.
  Hähnchenschnitzel daraufgeben und mit restlichen Walnüssen bestreuen.
