name: Hähnchenschnitzel in Kokos-Nuss-Kruste auf Feldsalat
description: Panierte Hähnchenschnitzel mit Kokos-Nuss-Kruste auf frischem Feldsalat
  mit Roter Bete, Birne und Walnüssen
author: EatSmarter
category: 🍲
servings: 2
prep_time: 10
cook_time: 25
image: images/recipes/haehnchenschnitzel-in-kokos-nuss-kruste-auf-feldsalat.png
kcal: 613
