name: Schafskäse aus dem Ofen auf Blumenkohlreis
description: Gebackener Feta mit Haselnuss-Gemüse-Topping auf frischem Blumenkohlreis
  mit Petersilie und Zitrone
author: EatSmarter
url: https://eatsmarter.de/rezepte/schafskaese-aus-dem-ofen-auf-blumenkohlreis-0
category: 🍲
servings: 4
prep_time: 15
cook_time: 10
kcal: 293
tags:
- Blumenkohl
- Feta
- Haselnüsse
- Käse
- Kohl
- Möhre
- Nüsse
- Öl
- Olivenöl
- Petersilie
- Zitrone
- Zwiebel
ingredients:
- name: Feta (9% Fett)
  amount: 400 g
- name: Haselnusskerne
  amount: 3 EL (45 g)
- name: Möhre
  amount: 1
- name: Rote Zwiebel
  amount: 0.5
- name: Olivenöl
  amount: 1 TL
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Blumenkohl
  amount: 600 g (1 kleiner)
- name: Petersilie
  amount: 1 Bund (20 g)
- name: Zitronensaft
  amount: 1 TL
instructions:
- Schafskäse in vier Stücke schneiden und in eine Auflaufform setzen. Haselnüsse grob
  hacken. Möhre putzen, waschen und grob raspeln. Zwiebel schälen und hacken. Nüsse
  mit Möhre, Zwiebel und Öl vermischen und mit Salz und Pfeffer würzen. Mischung auf
  die Käsestücke geben und im vorgeheizten Backofen bei 200 °C (Umluft 180 °C; Gas
  Stufe 3) 10 Minuten backen.
- Inzwischen Blumenkohl putzen, waschen, in Viertel schneiden und grob raspeln. Petersilie
  waschen, trocken schütteln und hacken. Blumenkohl mit Petersilie, Zitronensaft mischen
  und mit Salz und Pfeffer würzen. Anschließend Blumenkohl-Reis mit dem Schafskäse
  servieren.
import_date: '2026-02-26'
