name: Lammsteaks mit Petersilien-Thymian-Öl
description: Saftige Lammsteaks mit aromatischem Kräuteröl aus Petersilie und Thymian,
  serviert mit geröstetem Weißbrot
author: EatSmarter
url: https://eatsmarter.de/rezepte/lammsteaks-mit-petersilien-thymian-oel
category: 🍲
servings: 6
prep_time: 30
cook_time: 30
kcal: 633
