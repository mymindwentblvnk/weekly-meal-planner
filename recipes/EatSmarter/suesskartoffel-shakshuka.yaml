ingredients:
- name: Süßkartoffeln (sauber abgeschrubbt)
  amount: 1 kg
- name: Kleine rote Zwiebel
  amount: 1 (100 g)
- name: Zitronensaft
  amount: 3 EL
- name: Olivenöl
  amount: 3 EL
- name: Gereifter Cheddar (grob gerieben)
  amount: 150 g
- name: Knoblauchzehen
  amount: 3
- name: Kreuzkümmelsamen (im Mörser grob zerstoßen)
  amount: 1 TL
- name: Eier
  amount: 8
- name: Butter
  amount: 25 g
- name: Sriracha-Chilisauce
  amount: 0.75 EL
- name: Korianderblätter
  amount: 2 EL
- name: Salz
  amount: nach Geschmack
- name: Schwarzer Pfeffer
  amount: nach Geschmack
instructions:
- Den Backofen auf 200 °C (Umluft) vorheizen. Die Süßkartoffeln rundherum acht- bis
  zehnmal mit einer Gabel einstechen, dann auf ein mit Backpapier ausgelegtes Blech
  geben. Im Ofen 45-50 Minuten backen, bis sie weich und durchgegart sind. Die Süßkartoffeln
  zum Abkühlen beiseitestellen, die Backofentemperatur auf 180 °C (Umluft) reduzieren.
- Die Zwiebelringe in einer kleinen Schüssel mit 1 EL Zitronensaft sowie 1 Prise Salz
  verrühren; beiseitestellen.
- Von den gegarten Süßkartoffeln die Schale abziehen. Das Fleisch in etwa 4 cm große
  Stücke zupfen und in einer großen Schüssel beiseitestellen. Die Kartoffelschalen
  zurück auf das Backblech geben und mit 1 EL Öl, 1/4 TL Salz sowie 1 kräftigen Prise
  Pfeffer vermengen. Im Ofen 8 Minuten backen, bis sie schön gebräunt und knusprig
  sind. Zum Abkühlen beiseitestellen.
- Das Süßkartoffelfleisch mit einer Gabel fein zerdrücken. Den Cheddar, den Knoblauch,
  den Kreuzkümmel, 1 EL Öl, den restlichen EL Zitronensaft, 1 TL Salz sowie 1 kräftige
  Prise Pfeffer untermengen.
- In einer großen Pfanne, für die ein Deckel vorhanden ist, den restlichen EL Öl verteilen.
  Die Süßkartoffelmasse hineingeben und mit einem Löffel gleichmäßig verteilen. Bei
  mittlerer bis starker Hitze etwa 7 Minuten braten, bis die Unterseite etwas Farbe
  angenommen hat. Die Hitze auf mittlere Stufe reduzieren und mit einem Löffel acht
  Vertiefungen in die Süßkartoffelmasse drücken. In jede Vertiefung ein Ei aufschlagen,
  salzen und pfeffern. In der zugedeckten Pfanne 4-5 Minuten garen, bis das Eiweiß
  fest ist, die Eigelbe aber noch flüssig.
- Während die Eier garen, Butter und Sriracha-Sauce in einem kleinen Topf bei mittlerer
  Temperatur erhitzen, bis die Butter geschmolzen ist, dabei unablässig mit einem
  Schneebesen schlagen, bis die Mischung emulgiert ist. Die Sriracha-Butter vom Herd
  nehmen, bevor sie Blasen wirft - sie darf nicht gerinnen.
- Die Sriracha-Butter über die Eier gießen, 1 Handvoll von den knusprigen Schalenstücken,
  die Hälfte der gepickelten Zwiebelringe sowie die Korianderblätter hinzufügen. Sofort
  servieren und die Reste von knuspriger Kartoffelschale und eingelegter Zwiebel separat
  reichen.
