name: Schupfnudeln mit gebratenem Spitzkohl und roten Zwiebeln
description: Vegetarische Variante des schwäbischen Klassikers mit selbstgemachten
  Schupfnudeln aus Kartoffeln und Dinkelmehl, serviert mit gebratenem Spitzkohl
author: EatSmarter
url: https://eatsmarter.de/rezepte/schupfnudeln-mit-gebratenem-spitzkohl-und-roten-zwiebeln
category: 🍲
servings: 4
prep_time: 30
cook_time: 70
kcal: 422
image: images/recipes/schupfnudeln-mit-gebratenem-spitzkohl-und-roten-zwiebeln.jpg
