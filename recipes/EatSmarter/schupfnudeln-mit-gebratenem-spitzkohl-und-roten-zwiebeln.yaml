ingredients:
- name: Kartoffeln (mehligkochend)
  amount: 800 g
- name: Dinkelmehl Type 1050
  amount: 150 g
- name: Dinkelmehl Type 1050 (zum Bearbeiten)
  amount: 2 EL
- name: Ei
  amount: 1
- name: Salz
  amount: nach Geschmack
- name: Muskatnuss
  amount: nach Geschmack
- name: Rote Zwiebel
  amount: 1
- name: Spitzkohl (klein)
  amount: 1 (400 g)
- name: Olivenöl
  amount: 1 EL
- name: Apfelessig
  amount: 1 TL
- name: Gemüsebrühe
  amount: 50 ml
- name: Pfeffer
  amount: nach Geschmack
- name: Butter
  amount: 2 EL (30 g)
- name: Rosa Pfefferbeeren (gestoßen)
  amount: 2 TL
instructions:
- Kartoffeln waschen und in Wasser 25-30 Minuten kochen. Dann abgießen, 5 Minuten
  abkühlen lassen, pellen und durch eine Kartoffelpresse drücken. Kartoffeln mit Mehl,
  Ei, Salz und frisch abgeriebenem Muskat verkneten. Teig 15 Minuten ruhen lassen.
- Kartoffelteig mit mehligen Händen zu fingerförmigen ca. 6-7 cm langen Schupfnudeln
  formen. Diese in leicht siedendem Salzwasser in 4-5 Minuten gar ziehen lassen, bis
  die Schupfnudeln oben schwimmen. Mit einem Schaumlöffel herausnehmen, abschrecken
  und abtropfen lassen.
- Inzwischen Zwiebel schälen, halbieren und in Streifen schneiden. Spitzkohl putzen,
  Strunk herausschneiden, waschen und in feine Streifen schneiden. Öl in einer Pfanne
  erhitzen. Zwiebel darin bei mittlerer Hitze glasig dünsten. Spitzkohl zugeben, 2
  Minuten mitbraten und mit Essig und Brühe ablöschen. Mit Salz und Pfeffer würzen
  und aus der Pfanne nehmen. Butter schmelzen und Schupfnudeln portionsweise darin
  bei mittlerer Hitze 3-5 Minuten braten. Gemüse zugeben, mischen und mit Pfefferbeeren
  dekoriert servieren.
