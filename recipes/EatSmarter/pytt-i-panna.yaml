name: Pytt i panna
description: Schwedische Restepfanne mit knusprigen Kartoffeln, Roter Bete und Spiegelei
author: EatSmarter
url: https://eatsmarter.de/rezepte/pytt-i-panna-2
category: 🍲
servings: 4
prep_time: 10
cook_time: 25
kcal: 248
tags:
- Ei
- Kartoffeln
- Kräuter
- Öl
- Petersilie
- Rapsöl
- Rote Bete
- Schalotte
- Zwiebel
ingredients:
- name: Kartoffeln
  amount: 600 g
- name: Rapsöl
  amount: 3 EL
- name: Rote Bete (vorgegart, vakuumiert)
  amount: 250 g (2 Knollen)
- name: Schalotte
  amount: 1
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Petersilie
  amount: 10 g (0.5 Bund)
- name: Eier
  amount: 4
instructions:
- Kartoffeln schälen, waschen und in kleine Würfel schneiden. 2 EL Öl in einer Pfanne
  erhitzen. Kartoffelwürfel darin bei mittlerer Hitze und unter gelegentlichem Rühren
  10-12 Minuten braten. Rote Bete in Würfel schneiden. Zu den Kartoffeln geben und
  5 Minuten mitbraten.
- Inzwischen Schalotte schälen und würfeln. Ebenfalls in die Pfanne geben und 5 Minuten
  mitbraten. Anschließend salzen und pfeffern. Petersilie waschen, trocken schütteln
  und hacken.
- Restliches Öl in einer weiteren Pfanne erhitzen. Eier nacheinander aufschlagen,
  ins heiße Öl gleiten lassen und bei mittlerer Hitze in 3-5 Minuten daraus Spiegeleier
  braten. Kartoffelpfanne auf 4 Teller verteilen, mit Petersilie bestreuen, jeweils
  1 Spiegelei daraufgeben und mit Pfeffer würzen.
