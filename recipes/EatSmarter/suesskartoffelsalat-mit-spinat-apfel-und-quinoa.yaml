name: Süßkartoffelsalat mit Spinat, Apfel und Quinoa
description: Farbenfrohes Salat-Rezept mit gerösteten Süßkartoffeln, frischem Spinat,
  knackigen Äpfeln und gepuffter Quinoa
author: EatSmarter
url: https://eatsmarter.de/rezepte/suesskartoffelsalat-mit-spinat-apfel-und-quinoa
category: 🍲
servings: 4
prep_time: 10
cook_time: 30
kcal: 338
image: images/recipes/suesskartoffelsalat-mit-spinat-apfel-und-quinoa.jpg
tags:
