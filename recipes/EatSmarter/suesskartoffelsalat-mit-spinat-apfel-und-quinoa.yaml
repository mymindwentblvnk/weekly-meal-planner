ingredients:
- name: Süßkartoffel (groß)
  amount: 450 g
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Currypulver
  amount: 1 Msp.
- name: Olivenöl
  amount: 3 EL
- name: Baby-Spinat
  amount: 200 g
- name: Zitrone
  amount: 1
- name: Walnusskerne
  amount: 30 g
- name: Grüne Äpfel
  amount: 2
- name: Ahornsirup
  amount: 1 TL
- name: Gepuffte Quinoa
  amount: 15 g
- name: Schnittlauchblüten
  amount: 5 g
instructions:
- Süßkartoffel schälen und in mundgerechte Stücke schneiden. Mit Salz, Pfeffer, 1
  Msp. Curry und 1 EL Öl mischen und auf ein mit Backpapier ausgelegtes Backblech
  geben.
- Süßkartoffel im vorgeheizten Backofen bei 200 °C (180 °C Umluft; Gas Stufe 3) unter
  gelegentlichem Wenden in 20 Minuten bissfest garen. Herausnehmen und 10 Minuten
  abkühlen lassen.
- Inzwischen Spinat putzen, waschen und trocken schütteln. Zitrone halbieren und Saft
  auspressen. Walnüsse grob hacken. Äpfel putzen, waschen, vierteln, entkernen, in
  kleine Stücke schneiden und mit der Hälfte des Zitronensafts beträufeln.
- Restlichen Zitronensaft mit Ahornsirup, Salz, Pfeffer und restlichem Öl zu einem
  Dressing verrühren.
- Vorbereitete Zutaten mit dem Dressing in einer Schüssel mischen und in 4 Schalen
  verteilen. Den Salat mit Quinoa und Schnittlauchblüten bestreuen.
