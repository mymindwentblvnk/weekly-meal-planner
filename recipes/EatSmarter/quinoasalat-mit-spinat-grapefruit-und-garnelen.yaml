name: Quinoasalat mit Spinat, Grapefruit und Garnelen
description: Frischer Quinoasalat mit Babyspinat, saftiger Grapefruit und gebratenen
  Garnelen, verfeinert mit Minze und Limettendressing
author: EatSmarter
url: https://eatsmarter.de/rezepte/quinoasalat-mit-spinat-grapefruit-und-garnelen
category: 🍲
servings: 4
prep_time: 20
cook_time: 10
kcal: 525
