ingredients:
- name: Quinoa
  amount: 200 g
- name: Gemüsebrühe
  amount: 400 ml
- name: Garnelen (geschält)
  amount: 300 g
- name: Olivenöl
  amount: 3 EL
- name: Knoblauchzehe
  amount: 1
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Grapefruit (rosa)
  amount: 2
- name: Schalotte
  amount: 1
- name: Limettensaft
  amount: 2 EL
- name: Honig
  amount: 1 TL
- name: Babyspinat
  amount: 100 g
- name: Minze (frisch)
  amount: 0.5 Bund
instructions:
- Quinoa in einem Sieb kalt abspülen. In einem Topf mit der Gemüsebrühe aufkochen
  und bei kleiner Hitze zugedeckt ca. 10 Minuten garen, bis die Flüssigkeit aufgesogen
  ist. Vom Herd nehmen und abkühlen lassen.
- Die Garnelen waschen und trocken tupfen. 1 EL Olivenöl in einer Pfanne erhitzen.
  Den Knoblauch schälen und durch eine Presse dazudrücken. Die Garnelen darin bei
  mittlerer Hitze 2-3 Minuten braten, bis sie rosa sind. Mit Salz und Pfeffer würzen
  und beiseite stellen.
- Die Grapefruits so schälen, dass die weiße Haut vollständig entfernt wird. Die Filets
  zwischen den Trennhäuten herausschneiden und den Saft dabei auffangen.
- Die Schalotte schälen und fein würfeln. Mit 3 EL aufgefangenem Grapefruitsaft, Limettensaft,
  Honig und 2 EL Olivenöl verrühren. Mit Salz und Pfeffer abschmecken.
- Den abgekühlten Quinoa mit dem Dressing vermengen. Babyspinat waschen und trocken
  schleudern, Minze waschen und grob hacken.
- Quinoa mit Spinat, Grapefruitfilets, Garnelen und Minze mischen. Servieren.
