ingredients:
- name: Wildlachsfilet (ohne Haut, Gräten entfernt)
  amount: 400 g
- name: Avocado (reif)
  amount: 1
- name: Zitronensaft
  amount: 1 EL
- name: Schalotte
  amount: 1
- name: Kapern
  amount: 2 EL
- name: Schnittlauch
  amount: 0.5 Bund
- name: Limettensaft
  amount: 1 EL
- name: Olivenöl
  amount: 2 EL
- name: Salz
  amount: nach Geschmack
- name: Pfeffer
  amount: nach Geschmack
- name: Baguette (in Scheiben)
  amount: 1
- name: Salat (zum Servieren)
  amount: nach Geschmack
- name: Cocktailtomaten (zum Servieren)
  amount: nach Geschmack
instructions:
- Den Lachs in sehr feine Würfel schneiden und in eine Schüssel geben.
- Die Avocado halbieren, entkernen, das Fruchtfleisch herauslösen und ebenfalls in
  kleine Würfel schneiden. Sofort mit Zitronensaft beträufeln, damit sie nicht braun
  wird.
- Die Schalotte schälen und sehr fein hacken. Kapern abtropfen lassen und grob hacken.
  Schnittlauch waschen, trocken tupfen und in feine Röllchen schneiden.
- Lachs, Avocado, Schalotte, Kapern und Schnittlauch vorsichtig vermengen. Mit Limettensaft
  und Olivenöl würzen, mit Salz und Pfeffer abschmecken.
- Das Lachstatar auf Tellern anrichten, mit getoastetem Baguette, Salat und Cocktailtomaten
  servieren.
