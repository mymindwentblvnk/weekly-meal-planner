name: Vegane Linsenpancakes mit Zucchini-Zaziki
description: Herzhafte Pancakes aus roten Linsen mit cremigem Zucchini-Zaziki - ein proteinreiches veganes Gericht
author: EatSmarter
url: https://eatsmarter.de/rezepte/vegane-linsenpancakes-mit-zucchini-zaziki
category: 🍲
servings: 2
prep_time: 10
cook_time: 10
kcal: 480
import_date: 2026-02-26
image: images/recipes/vegane-linsenpancakes-mit-zucchini-zaziki.png
tags:
  - Gemüsebrühe
  - Gewürze
  - Hülsenfrüchte
  - Knoblauch
  - Kreuzkümmel
  - Linsen
  - Olivenöl
  - Pfeffer
  - Salz
  - Tofu
  - Zitrone
  - Zucchini

ingredients:
  - name: Rote Linsen
    amount: 150 g
  - name: Gemüsebrühe
    amount: 180 ml
  - name: Kreuzkümmel (gemahlen)
    amount: 1 TL
  - name: Salz
    amount: nach Geschmack
  - name: Pfeffer
    amount: nach Geschmack
  - name: Olivenöl
    amount: 2 EL
  - name: Zucchini (klein)
    amount: 1
  - name: Knoblauch
    amount: 1 Zehe
  - name: Sojaquark
    amount: 250 g
  - name: Zitronensaft
    amount: 1 Spritzer

instructions:
  - Die Linsen in einem Sieb unter fließendem Wasser waschen und abtropfen lassen.
  - Linsen mit Gemüsebrühe, der Hälfte des Kreuzkümmels, Salz und Pfeffer in einem Standmixer oder mit dem Pürierstab pürieren.
  - Das Öl in einer beschichteten Pfanne erhitzen. Je Pancake etwa 1 EL Teig hineingeben und von jeder Seite 2-3 Minuten backen.
  - Für das Zaziki die Zucchini waschen, putzen und fein raspeln. In ein Sieb geben und die überschüssige Flüssigkeit herausdrücken.
  - Den Knoblauch schälen und pressen oder klein schneiden. Den Sojaquark mit Zucchiniraspeln und Knoblauch vermischen. Mit Zitronensaft, restlichem Kreuzkümmel, Salz und Pfeffer abschmecken.
