- Orange
- Salat
- Walnüsse
- Zitrone
ingredients:
- name: Berglinsen
  amount: 375 g
- name: Salz
  amount: nach Geschmack
- name: Weißweinessig
  amount: 4 EL
- name: Orangen (groß)
  amount: 2 (500 g)
- name: Zitrone
  amount: 1
- name: Mizuna (alternativ Babysalat-Mix)
  amount: 20 g (1 Handvoll)
- name: Gemischte Nusskerne (z.B. Haselnüsse, Mandeln, Walnüsse)
  amount: 60 g
- name: Olivenöl
  amount: 2 EL
- name: Walnussöl
  amount: 2 EL
- name: Pfeffer
  amount: nach Geschmack
instructions:
- Linsen in kochendem Wasser 25-30 Minuten garen, sodass sie noch leichten Biss haben;
  dabei in den letzten 5 Minuten salzen und Essig zugeben. Anschließend abgießen,
  kalt abspülen, abtropfen lassen und in eine Schüssel geben.
- Inzwischen Orangen und Zitrone mit einem scharfen Messer rundherum so schälen, dass
  das Weiße mitentfernt wird. Früchte in Scheiben schneiden. Saft aus den Fruchtresten
  zu den Linsen pressen. Salatblätter waschen und trocken schütteln.
- Nüsse in einer heißen Pfanne ohne Fett bei mittlerer Hitze 3 Minuten anrösten. Zusammen
  mit beiden Ölen zu den Linsen geben, mit Salz und Pfeffer abschmecken. Linsen mit
  den Fruchtscheiben und Mizuna mischen sowie in Schüsseln anrichten.
