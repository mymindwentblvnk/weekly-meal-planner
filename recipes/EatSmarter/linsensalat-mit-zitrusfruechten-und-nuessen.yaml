name: Linsensalat mit Zitrusfrüchten und Nüssen
description: Herzhafter Linsensalat mit saftigen Orangen, Zitrone und gerösteten gemischten
  Nüssen, verfeinert mit Walnussöl
author: EatSmarter
url: https://eatsmarter.de/rezepte/linsensalat-mit-zitrusfruechten-und-nuessen
category: 🍲
servings: 4
prep_time: 10
cook_time: 25
kcal: 483
image: images/recipes/linsensalat-mit-zitrusfruechten-und-nuessen.jpg
tags:
