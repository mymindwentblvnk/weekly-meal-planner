name: Ofenkartoffeln mit Kräuterquark und geräuchertem Lachs
description: Knusprige Ofenkartoffeln serviert mit cremigem Kräuterquark und geräuchertem Lachs - ein ausgewogenes Gericht für Sportler
author: DFB Akademie
url: https://www.dfb-akademie.de/ofenkartoffeln-mit-kraeuterquark-und-geraeuchertem-lachs/-/id-11009667
category: 🍲
servings: 4
prep_time: 15
cook_time: 30
kcal: 420
import_date: 2026-02-26
image: images/recipes/ofenkartoffeln-mit-kraeuterquark-und-geraeuchertem-lachs.jpg
tags:
  - Fisch
  - Joghurt
  - Kartoffeln
  - Knoblauch
  - Kräuter
  - Lachs
  - Olivenöl
  - Pfeffer
  - Quark
  - Salz
  - Zitrone

ingredients:
  - name: Kartoffeln (festkochend)
    amount: 800 g
  - name: Knoblauch
    amount: 1 Zehe
  - name: Olivenöl
    amount: 2 EL
  - name: Salz
    amount: nach Geschmack
  - name: Pfeffer
    amount: nach Geschmack
  - name: Petersilie (glatt)
    amount: 0.5 Bund
  - name: Schnittlauch
    amount: 0.5 Bund
  - name: Karotte
    amount: 1
  - name: Joghurt (1,5%)
    amount: 200 g
  - name: Quark (20%)
    amount: 200 g
  - name: Curry
    amount: 1 Prise
  - name: Zitrone
    amount: 1
  - name: Räucherlachs
    amount: 200 g

instructions:
  - Kartoffeln waschen, trocken tupfen und in kleine Würfel schneiden. Knoblauch schälen und fein hacken.
  - Kartoffeln, Knoblauch, Olivenöl, Salz und Pfeffer vermischen und auf einem gefetteten Backblech verteilen.
  - Im vorgeheizten Backofen bei 200°C Ober-/Unterhitze (175°C Umluft) für 20-25 Minuten backen.
  - Für den Kräuterquark Petersilie und Schnittlauch waschen, Stiele entfernen und fein hacken. Karotte schälen und grob raspeln.
  - Kräuter und Karottenraspel mit Joghurt und Quark vermischen. Mit Salz, Pfeffer und Curry abschmecken.
  - Lachs nach Belieben mit Zitronensaft beträufeln. Ofenkartoffeln mit Kräuterquark und Lachs servieren.
