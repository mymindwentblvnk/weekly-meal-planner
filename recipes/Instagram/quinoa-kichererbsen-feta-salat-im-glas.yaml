name: Quinoa-Kichererbsen-Feta-Salat im Glas
description: Frischer Meal-Prep-Salat mit Quinoa, Kichererbsen, Feta und Granatapfelkernen in einem würzigen Balsamico-Dressing. Perfekt für die Mittagspause, hält 4 Tage im Kühlschrank.
author: Instagram
url: https://www.instagram.com/p/DV1pnh4DTnu/
category: 🍲
servings: 4
prep_time: 20
cook_time: 15
kcal: 520
import_date: 2026-03-19
image: images/recipes/quinoa-kichererbsen-feta-salat-im-glas.jpg
tags:
  - Essig
  - Feta
  - Frühlingszwiebeln
  - Gewürze
  - Granatapfel
  - Gurke
  - Hülsenfrüchte
  - Käse
  - Kichererbsen
  - Kräuter
  - Paprika
  - Petersilie
  - Quinoa
  - Tomaten
  - Zitrone
  - Zitrusfrüchte
  - Zwiebeln

ingredients:
  - name: Quinoa
    amount: 150 g
  - name: Kichererbsen (vorgekocht)
    amount: 250 g
  - name: Paprika
    amount: 2
  - name: Frühlingszwiebeln
    amount: 2
  - name: Gurke
    amount: 0.5
  - name: Tomaten
    amount: 2
  - name: Petersilie (gehackt)
    amount: 100 g
  - name: Granatapfelkerne
    amount: nach Belieben
  - name: Feta
    amount: 300 g
  - name: Sumach
    amount: nach Belieben
  - name: Paprikapulver
    amount: nach Belieben
  - name: Salz
    amount: nach Belieben
  - name: Pfeffer
    amount: nach Belieben
  - name: Olivenöl
    amount: 60 ml
  - name: Balsamico
    amount: 4 EL
  - name: Agavendicksaft
    amount: 1 EL
  - name: Beerenmarmelade
    amount: 2 TL
  - name: Zitronensaft
    amount: 1 Zitrone

instructions:
  - Quinoa nach Packungsanweisung kochen und vollständig abkühlen lassen.
  - Paprika, Gurke und Tomaten würfeln. Frühlingszwiebeln in Ringe schneiden. Petersilie hacken.
  - Kichererbsen mit Sumach, Paprikapulver, Salz und Pfeffer würzen. Optional in einer Pfanne kurz anrösten.
  - Für das Dressing Olivenöl, Balsamico, Agavendicksaft, Beerenmarmelade, Zitronensaft, Salz und Pfeffer verrühren.
  - Quinoa, Kichererbsen, Paprika, Gurke, Tomaten, Petersilie und Feta in einer Schüssel mit dem Dressing gründlich vermengen.
  - Die Mischung in vier 800-ml-Gläser füllen. Mit Granatapfelkernen und Frühlingszwiebeln toppen.
  - Vor dem Servieren schütteln oder in eine Schüssel stürzen. Im Kühlschrank ca. 4 Tage haltbar.
