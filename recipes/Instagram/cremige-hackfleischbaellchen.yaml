name: Cremige Hackfleischbällchen
description: Cremige Hackfleischbällchen in einer tomatigen Soße mit Sahne und Pizzagewürz. Perfekt zu Kartoffelpüree oder Erbsen-Möhren-Gemüse.
author: Instagram
url: https://www.instagram.com/p/DV-0Ng_DFMK/
category: 🍲
servings: 4
prep_time: 15
cook_time: 25
import_date: 2026-03-19
image: images/recipes/cremige-hackfleischbaellchen.jpg
tags:
  - Brot
  - Brühe
  - Butter
  - Eier
  - Fleisch
  - Gewürze
  - Mehl
  - Paniermehl
  - Rind
  - Sahne
  - Senf
  - Tomaten
  - Zwiebeln

ingredients:
  - name: Rinderhackfleisch
    amount: 400 g
  - name: Zwiebel (klein, fein gehackt)
    amount: 1
  - name: Ei
    amount: 1
  - name: Paniermehl
    amount: 4 EL
  - name: Brötchen (alt, in Milch eingeweicht)
    amount: 1
  - name: Salz
    amount: nach Belieben
  - name: Pfeffer
    amount: nach Belieben
  - name: Paprika edelsüß
    amount: nach Belieben
  - name: Senf
    amount: 1 TL
  - name: Butter (zum Anbraten)
    amount: 1 EL
  - name: Butter (für Soße)
    amount: 15-20 g
  - name: Mehl
    amount: 2 EL
  - name: Tomatenmark
    amount: 30 g
  - name: Gemüsebrühe
    amount: 300-400 ml
  - name: Sahne
    amount: 100 ml
  - name: Pizzagewürz
    amount: 1 EL

instructions:
  - Hackfleisch mit Zwiebel, Ei, Paniermehl (oder ausgedrücktem Brötchen), Pfeffer, Salz, Paprika und Senf vermengen.
  - Zu gleichmäßigen, kleinen Hackbällchen formen.
  - In einer Pfanne mit Butter oder Öl rundherum anbraten, dann herausnehmen.
  - In derselben Pfanne die Butter schmelzen, Mehl darin anschwitzen.
  - Unter Rühren mit Gemüsebrühe ablöschen.
  - Tomatenmark einrühren, Sahne und Pizzagewürz hinzufügen und etwas einkochen lassen.
  - Hackfleischbällchen zurück in die Soße geben und kurz ziehen lassen.
  - Mit Kartoffelpüree oder Erbsen-Möhren-Gemüse servieren.
